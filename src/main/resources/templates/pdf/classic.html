<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Resume</title>
<style>
    @page { size: A4; margin: 20mm 18mm; }
    body { font-family: Georgia, 'Times New Roman', serif; margin: 0; padding: 0; color: #2c2c2c; font-size: 11px; line-height: 1.5; }
    .header { text-align: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #2c2c2c; }
    .name { font-size: 22px; font-weight: 700; color: #1a1a1a; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
    .jtitle { font-size: 12px; color: #666; font-style: italic; margin-bottom: 8px; }
    .cr { text-align: center; font-size: 10px; color: #555; margin-bottom: 0; }
    .sh { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #1a1a1a; border-bottom: 1.5px solid #1a1a1a; padding-bottom: 3px; margin-bottom: 10px; margin-top: 16px; }
    .st { font-size: 11px; color: #444; line-height: 1.7; }
    .ei { margin-bottom: 12px; }
    .etop { margin-bottom: 2px; }
    .et { font-size: 12px; font-weight: 700; color: #1a1a1a; }
    .edate { font-size: 10px; color: #777; font-style: italic; float: right; }
    .ec { font-size: 11px; color: #444; font-style: italic; margin-bottom: 3px; }
    .edesc { font-size: 10px; color: #444; line-height: 1.6; }
    .clear { clear: both; }
    .stag { display: inline-block; font-size: 10px; padding: 2px 10px; border: 1px solid #aaa; border-radius: 10px; color: #333; margin: 2px 3px 2px 0; }
</style></head>
<body>
<div class="header">
    <div class="name" th:text="${resume.personalInfo.fullName} ?: 'Your Name'">Name</div>
    <div class="jtitle" th:text="${resume.personalInfo.jobTitle} ?: ''"></div>
    <div class="cr">
        <span th:if="${resume.personalInfo.email != ''}" th:text="${resume.personalInfo.email}"></span>
        <span th:if="${resume.personalInfo.phone != ''}" th:text="' | ' + ${resume.personalInfo.phone}"></span>
        <span th:if="${resume.personalInfo.address != ''}" th:text="' | ' + ${resume.personalInfo.address}"></span>
    </div>
</div>
<div th:if="${resume.personalInfo.summary != ''}"><div class="sh">Summary</div><div class="st" th:text="${resume.personalInfo.summary}"></div></div>
<div th:if="${resume.workExperiences != null and !resume.workExperiences.isEmpty()}">
    <div class="sh">Experience</div>
    <div class="ei" th:each="exp : ${resume.workExperiences}">
        <div class="etop"><span class="et" th:text="${exp.position}"></span><span class="edate"><span th:text="${exp.startDate}"></span> - <span th:text="${exp.current ? 'Present' : exp.endDate}"></span></span></div>
        <div class="clear"></div>
        <div class="ec" th:text="${exp.company}"></div>
        <div class="edesc" th:text="${exp.description}"></div>
    </div>
</div>
<div th:if="${resume.educations != null and !resume.educations.isEmpty()}">
    <div class="sh">Education</div>
    <div class="ei" th:each="edu : ${resume.educations}">
        <div class="etop"><span class="et" th:text="${edu.degree + (edu.fieldOfStudy != '' ? ' - ' + edu.fieldOfStudy : '')}"></span><span class="edate"><span th:text="${edu.startDate}"></span> - <span th:text="${edu.endDate}"></span></span></div>
        <div class="clear"></div>
        <div class="ec" th:text="${edu.institution}"></div>
    </div>
</div>
<div th:if="${resume.skills != null and !resume.skills.isEmpty()}">
    <div class="sh">Skills</div>
    <span class="stag" th:each="skill : ${resume.skills}" th:text="${skill.name}"></span>
</div>
</body></html>
