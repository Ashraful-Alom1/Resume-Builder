<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Resume Builder — Create Professional Resumes</title>
    <meta name="description" content="Build stunning professional resumes with live preview, multiple templates, and PDF export."/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="/css/style.css" rel="stylesheet"/>
    <link rel="icon" type="image/png" href="/favicon.png"/>
</head>
<body>

<!-- Top Navbar -->
<nav class="navbar-custom" id="mainNavbar">
    <div class="navbar-inner">
        <div class="navbar-brand-area">
            <div class="brand-icon"><i class="bi bi-file-earmark-person-fill"></i></div>
            <span class="brand-text">ResumeForge</span>
        </div>
        <div class="navbar-actions">
            <button class="btn-action btn-json-load" id="btnLoadJson" title="Load JSON">
                <i class="bi bi-upload"></i><span>Import</span>
            </button>
            <button class="btn-action btn-json-save" id="btnSaveJson" title="Save JSON">
                <i class="bi bi-download"></i><span>Save</span>
            </button>
            <button class="btn-action btn-pdf" id="btnExportPdf" title="Export PDF">
                <i class="bi bi-file-earmark-pdf-fill"></i><span>Export PDF</span>
            </button>
            <input type="file" id="jsonFileInput" accept=".json" style="display:none"/>
        </div>
    </div>
</nav>

<div class="app-container" id="appContainer">
    <!-- LEFT: Form Panel -->
    <div class="form-panel" id="formPanel">
        <div class="form-panel-inner">

            <!-- Personal Info -->
            <div class="section-card" id="sectionPersonal">
                <div class="section-header" data-bs-toggle="collapse" data-bs-target="#collapsePersonal">
                    <div class="section-icon"><i class="bi bi-person-fill"></i></div>
                    <h2 class="section-title">Personal Information</h2>
                    <i class="bi bi-chevron-up section-chevron"></i>
                </div>
                <div class="collapse show" id="collapsePersonal">
                    <div class="section-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-floating-custom">
                                    <input type="text" class="form-input" id="fullName" placeholder=" " data-field="personalInfo.fullName"/>
                                    <label for="fullName">Full Name</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating-custom">
                                    <input type="text" class="form-input" id="jobTitle" placeholder=" " data-field="personalInfo.jobTitle"/>
                                    <label for="jobTitle">Job Title</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating-custom">
                                    <input type="email" class="form-input" id="email" placeholder=" " data-field="personalInfo.email"/>
                                    <label for="email">Email</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating-custom">
                                    <input type="tel" class="form-input" id="phone" placeholder=" " data-field="personalInfo.phone"/>
                                    <label for="phone">Phone</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating-custom">
                                    <input type="text" class="form-input" id="address" placeholder=" " data-field="personalInfo.address"/>
                                    <label for="address">Address</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating-custom">
                                    <input type="url" class="form-input" id="linkedIn" placeholder=" " data-field="personalInfo.linkedIn"/>
                                    <label for="linkedIn">LinkedIn URL</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-floating-custom">
                                    <input type="url" class="form-input" id="website" placeholder=" " data-field="personalInfo.website"/>
                                    <label for="website">Website / Portfolio</label>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-floating-custom">
                                    <textarea class="form-input form-textarea" id="summary" placeholder=" " data-field="personalInfo.summary" rows="3"></textarea>
                                    <label for="summary">Professional Summary</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Work Experience -->
            <div class="section-card" id="sectionWork">
                <div class="section-header" data-bs-toggle="collapse" data-bs-target="#collapseWork">
                    <div class="section-icon"><i class="bi bi-briefcase-fill"></i></div>
                    <h2 class="section-title">Work Experience</h2>
                    <i class="bi bi-chevron-up section-chevron"></i>
                </div>
                <div class="collapse show" id="collapseWork">
                    <div class="section-body">
                        <div id="workExperienceList"></div>
                        <button class="btn-add-item" id="btnAddWork" type="button">
                            <i class="bi bi-plus-circle"></i> Add Experience
                        </button>
                    </div>
                </div>
            </div>

            <!-- Education -->
            <div class="section-card" id="sectionEducation">
                <div class="section-header" data-bs-toggle="collapse" data-bs-target="#collapseEducation">
                    <div class="section-icon"><i class="bi bi-mortarboard-fill"></i></div>
                    <h2 class="section-title">Education</h2>
                    <i class="bi bi-chevron-up section-chevron"></i>
                </div>
                <div class="collapse show" id="collapseEducation">
                    <div class="section-body">
                        <div id="educationList"></div>
                        <button class="btn-add-item" id="btnAddEducation" type="button">
                            <i class="bi bi-plus-circle"></i> Add Education
                        </button>
                    </div>
                </div>
            </div>

            <!-- Skills -->
            <div class="section-card" id="sectionSkills">
                <div class="section-header" data-bs-toggle="collapse" data-bs-target="#collapseSkills">
                    <div class="section-icon"><i class="bi bi-stars"></i></div>
                    <h2 class="section-title">Skills</h2>
                    <i class="bi bi-chevron-up section-chevron"></i>
                </div>
                <div class="collapse show" id="collapseSkills">
                    <div class="section-body">
                        <div id="skillsList"></div>
                        <button class="btn-add-item" id="btnAddSkill" type="button">
                            <i class="bi bi-plus-circle"></i> Add Skill
                        </button>
                    </div>
                </div>
            </div>

            <!-- Relevant Coursework -->
            <div class="section-card" id="sectionCoursework">
                <div class="section-header" data-bs-toggle="collapse" data-bs-target="#collapseCoursework">
                    <div class="section-icon"><i class="bi bi-book-fill"></i></div>
                    <h2 class="section-title">Relevant Coursework</h2>
                    <i class="bi bi-chevron-up section-chevron"></i>
                </div>
                <div class="collapse show" id="collapseCoursework">
                    <div class="section-body">
                        <div class="form-floating-custom">
                            <textarea class="form-input form-textarea" id="relevantCoursework" placeholder=" " rows="2"></textarea>
                            <label for="relevantCoursework">Courses (comma-separated)</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Technical Skills -->
            <div class="section-card" id="sectionTechSkills">
                <div class="section-header" data-bs-toggle="collapse" data-bs-target="#collapseTechSkills">
                    <div class="section-icon"><i class="bi bi-code-slash"></i></div>
                    <h2 class="section-title">Technical Skills</h2>
                    <i class="bi bi-chevron-up section-chevron"></i>
                </div>
                <div class="collapse show" id="collapseTechSkills">
                    <div class="section-body">
                        <div class="row g-3">
                            <div class="col-12"><div class="form-floating-custom"><input type="text" class="form-input" id="tsLangs" placeholder=" "/><label for="tsLangs">Programming Languages</label></div></div>
                            <div class="col-12"><div class="form-floating-custom"><input type="text" class="form-input" id="tsFrameworks" placeholder=" "/><label for="tsFrameworks">Frameworks / Libraries</label></div></div>
                            <div class="col-12"><div class="form-floating-custom"><input type="text" class="form-input" id="tsDatabases" placeholder=" "/><label for="tsDatabases">Databases</label></div></div>
                            <div class="col-12"><div class="form-floating-custom"><input type="text" class="form-input" id="tsCloud" placeholder=" "/><label for="tsCloud">Cloud / DevOps</label></div></div>
                            <div class="col-12"><div class="form-floating-custom"><input type="text" class="form-input" id="tsTools" placeholder=" "/><label for="tsTools">Tools</label></div></div>
                            <div class="col-12"><div class="form-floating-custom"><input type="text" class="form-input" id="tsConcepts" placeholder=" "/><label for="tsConcepts">Concepts</label></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Projects -->
            <div class="section-card" id="sectionProjects">
                <div class="section-header" data-bs-toggle="collapse" data-bs-target="#collapseProjects">
                    <div class="section-icon"><i class="bi bi-rocket-takeoff-fill"></i></div>
                    <h2 class="section-title">Projects</h2>
                    <i class="bi bi-chevron-up section-chevron"></i>
                </div>
                <div class="collapse show" id="collapseProjects">
                    <div class="section-body">
                        <div id="projectsList"></div>
                        <button class="btn-add-item" id="btnAddProject" type="button">
                            <i class="bi bi-plus-circle"></i> Add Project
                        </button>
                    </div>
                </div>
            </div>

            <!-- Achievements -->
            <div class="section-card" id="sectionAchievements">
                <div class="section-header" data-bs-toggle="collapse" data-bs-target="#collapseAchievements">
                    <div class="section-icon"><i class="bi bi-trophy-fill"></i></div>
                    <h2 class="section-title">Achievements</h2>
                    <i class="bi bi-chevron-up section-chevron"></i>
                </div>
                <div class="collapse show" id="collapseAchievements">
                    <div class="section-body">
                        <div id="achievementsList"></div>
                        <button class="btn-add-item" id="btnAddAchievement" type="button">
                            <i class="bi bi-plus-circle"></i> Add Achievement
                        </button>
                    </div>
                </div>
            </div>

            <!-- Certifications -->
            <div class="section-card" id="sectionCertifications">
                <div class="section-header" data-bs-toggle="collapse" data-bs-target="#collapseCertifications">
                    <div class="section-icon"><i class="bi bi-award-fill"></i></div>
                    <h2 class="section-title">Certifications</h2>
                    <i class="bi bi-chevron-up section-chevron"></i>
                </div>
                <div class="collapse show" id="collapseCertifications">
                    <div class="section-body">
                        <div id="certificationsList"></div>
                        <button class="btn-add-item" id="btnAddCertification" type="button">
                            <i class="bi bi-plus-circle"></i> Add Certification
                        </button>
                    </div>
                </div>
            </div>

            <!-- Additional Information -->
            <div class="section-card" id="sectionAdditionalInfo">
                <div class="section-header" data-bs-toggle="collapse" data-bs-target="#collapseAdditionalInfo">
                    <div class="section-icon"><i class="bi bi-info-circle-fill"></i></div>
                    <h2 class="section-title">Additional Information</h2>
                    <i class="bi bi-chevron-up section-chevron"></i>
                </div>
                <div class="collapse show" id="collapseAdditionalInfo">
                    <div class="section-body">
                        <div id="additionalInfoList"></div>
                        <button class="btn-add-item" id="btnAddAdditionalInfo" type="button">
                            <i class="bi bi-plus-circle"></i> Add Information
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- RIGHT: Preview Panel -->
    <div class="preview-panel" id="previewPanel">
        <div class="preview-toolbar" id="previewToolbar">
            <div class="template-selector">
                <span class="template-label">Template:</span>
                <div class="template-buttons">
                    <button class="template-btn active" data-template="modern" id="tplModern">
                        <i class="bi bi-grid-1x2-fill"></i> Modern
                    </button>
                    <button class="template-btn" data-template="classic" id="tplClassic">
                        <i class="bi bi-file-text-fill"></i> Classic
                    </button>
                    <button class="template-btn" data-template="creative" id="tplCreative">
                        <i class="bi bi-palette-fill"></i> Creative
                    </button>
                </div>
            </div>
        </div>
        <div class="preview-wrapper" id="previewWrapper">
            <div class="preview-paper" id="previewContent">
                <div class="preview-placeholder">
                    <i class="bi bi-file-earmark-plus"></i>
                    <p>Start filling in your details to see a live preview</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-border text-light" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer">
    <div class="toast custom-toast" id="appToast" role="alert">
        <div class="toast-body" id="toastBody"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
